pekko {
  loglevel = "INFO"
  actor {
    provider = "local"
  }
}

# The pattern: one dedicated thread per session actor for the
# lifetime of that actor. Every Playwright/OpenGL/SQLite/COM call
# routed through that actor runs on the same thread, which is what
# thread-affine native handles require. Pekko's PinnedDispatcher is
# exactly this — a dispatcher that allocates one OS thread per actor
# and never moves the actor between threads.
session-pinned-dispatcher {
  type     = PinnedDispatcher
  executor = "thread-pool-executor"
}
